services:

  # ── Local LLM (Ollama) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: dka_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persists downloaded models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Model pull (runs once, then exits) ────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: dka_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    restart: "no"

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dka_backend
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db   # persists vector store
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - CHROMA_COLLECTION_NAME=documents
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - RETRIEVAL_K=5
      - RETRIEVAL_SCORE_THRESHOLD=0.3
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE_MB=50
      - ALLOWED_ORIGINS=["http://localhost:3000"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dka_frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:    # LLM model weights (~2 GB, downloaded once)
  chroma_data:    # Vector store (your indexed documents)
