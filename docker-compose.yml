services:

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dka_backend
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db   # persists vector store
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - CHROMA_COLLECTION_NAME=documents
      - CHUNK_SIZE=600
      - CHUNK_OVERLAP=150
      - RETRIEVAL_K=3
      - RETRIEVAL_SCORE_THRESHOLD=0.3
      - LLM_MAX_TOKENS=300
      - LLM_CONTEXT_WINDOW=2048
      - LLM_REQUEST_TIMEOUT=120
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE_MB=50
      - ALLOWED_ORIGINS=["http://localhost:3001"]
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dka_frontend
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:    # Vector store (your indexed documents)
